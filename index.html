<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Absensi Online</title>

<style>

body{
    font-family:Arial;
    padding:20px;
    background:#f3f5f8;
}

.toolbar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    margin-bottom:10px;
}

.toolbar select,
.toolbar input{
    height:48px;
    font-size:20px;
    padding:0 10px;
}

.toolbar button{
    height:48px;
    padding:0 15px;
    font-size:16px;
    white-space:nowrap;
}

button{
    cursor:pointer;
}

table{
    border-collapse:collapse;
    width:auto;
}

th,
td{
    border:1px solid #ccc;
    padding:4px 8px;
    white-space:nowrap;
}

th{
    background:#0d6efd;
    color:white;
}

.nama{
    text-align:left;
    padding-left:15px;
    width:auto;
    font-size:20px;
}

.h{background:#198754;color:white;}
.s{background:#ffc107;}
.i{background:#0dcaf0;color:white;}
.a{background:#dc3545;color:white;}
.h,
.s,
.i,
.a{
    width:38px;
    height:38px;
    padding:0;
    margin:0;
    font-size:16px;
    font-weight:bold;
    border:none;
    border-radius:6px;
}
.active{
    outline:3px solid black;
}

.kelas-box{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(80px,1fr));
    gap:8px;
    margin:10px 0;
}

.kelas-box label{
    border:1px solid #ddd;
    border-radius:8px;
    padding:10px;
    background:white;
}
</style>
</head>
<body>

<h2>ABSENSI SISWA</h2>
<div class="toolbar">
<select id="kelas" onchange="loadSiswa()">
<option>7A</option>
<option>7B</option>
<option>7C</option>
<option>7D</option>
<option>7E</option>
<option>7F</option>
<option>7G</option>
<option>7H</option>
<option>7I</option>
</select>

<input type="date" id="tanggal">

<button onclick="simpan()">
Simpan
</button>
    
<select id="kelasDownload">
    <option value="">Pilih Kelas</option>
    <option value="7A">7A</option>
    <option value="7B">7B</option>
    <option value="7C">7C</option>
    <option value="7D">7D</option>
    <option value="7E">7E</option>
    <option value="7F">7F</option>
    <option value="7G">7G</option>
    <option value="7H">7H</option>
    <option value="7I">7I</option>
    <option value="SEMUA">SEMUA KELAS</option>
</select>

<button onclick="downloadCSV()">
📥 Download
</button>
</div>

<table>

<thead>
<tr>
<th>No</th>
<th>NIS</th>
<th>Nama</th>
<th>L/P</th>
<th>H</th>
<th>S</th>
<th>I</th>
<th>A</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<script>

const API =
"https://script.google.com/macros/s/AKfycbwSZGx3qx_qHTSQIALCPR3o5YnAreNEM05Ujb8xHxdjddA9xqK1DgoWc_h98ca2qZOK/exec";

const MAX_ROWS = 32;

let dataSiswa = [];

/* =========================
   CACHE DOM
========================= */

const tbody = document.getElementById("tbody");
const kelas = document.getElementById("kelas");
const tanggal = document.getElementById("tanggal");
const kelasDownload =
document.getElementById("kelasDownload");

/* =========================
   CACHE ROWS
========================= */

const rowCache = [];

/* =========================
   BUAT TABEL SEKALI SAJA
========================= */

function initTable(){

    const fragment =
    document.createDocumentFragment();

    for(let i=0;i<MAX_ROWS;i++){

        const tr =
        document.createElement("tr");

        const tdNo =
        document.createElement("td");

        const tdNis =
        document.createElement("td");

        const tdNama =
        document.createElement("td");

        tdNama.className = "nama";

        const tdJk =
        document.createElement("td");

        const tdH =
        document.createElement("td");

        const tdS =
        document.createElement("td");

        const tdI =
        document.createElement("td");

        const tdA =
        document.createElement("td");

        const btnH =
        document.createElement("button");

        btnH.className = "h";
        btnH.textContent = "H";

        const btnS =
        document.createElement("button");

        btnS.className = "s";
        btnS.textContent = "S";

        const btnI =
        document.createElement("button");

        btnI.className = "i";
        btnI.textContent = "I";

        const btnA =
        document.createElement("button");

        btnA.className = "a";
        btnA.textContent = "A";

        btnH.onclick = () => setStatus(i,"H");
        btnS.onclick = () => setStatus(i,"S");
        btnI.onclick = () => setStatus(i,"I");
        btnA.onclick = () => setStatus(i,"A");

        tdH.appendChild(btnH);
        tdS.appendChild(btnS);
        tdI.appendChild(btnI);
        tdA.appendChild(btnA);

        tr.appendChild(tdNo);
        tr.appendChild(tdNis);
        tr.appendChild(tdNama);
        tr.appendChild(tdJk);
        tr.appendChild(tdH);
        tr.appendChild(tdS);
        tr.appendChild(tdI);
        tr.appendChild(tdA);

        fragment.appendChild(tr);

        rowCache.push({
            tr,
            tdNo,
            tdNis,
            tdNama,
            tdJk,
            btnH,
            btnS,
            btnI,
            btnA
        });
    }

    tbody.appendChild(fragment);
}

/* =========================
   UPDATE STATUS SATU BARIS
========================= */

function updateStatusUI(index){

    const siswa =
    dataSiswa[index];

    if(!siswa) return;

    const row =
    rowCache[index];

    row.btnH.classList.remove("active");
    row.btnS.classList.remove("active");
    row.btnI.classList.remove("active");
    row.btnA.classList.remove("active");

    switch(siswa.status){

        case "H":
            row.btnH.classList.add("active");
            break;

        case "S":
            row.btnS.classList.add("active");
            break;

        case "I":
            row.btnI.classList.add("active");
            break;

        case "A":
            row.btnA.classList.add("active");
            break;
    }
}

/* =========================
   UPDATE ISI TABEL
========================= */

function updateTable(){

    const jumlah =
    dataSiswa.length;

    for(let i=0;i<MAX_ROWS;i++){

        const row =
        rowCache[i];

        if(i < jumlah){

            const s =
            dataSiswa[i];

            row.tr.style.display = "";

            row.tdNo.textContent =
            s.no;

            row.tdNis.textContent =
            s.nis;

            row.tdNama.textContent =
            s.nama;

            row.tdJk.textContent =
            s.jk;

            updateStatusUI(i);

        }else{

            row.tr.style.display =
            "none";
        }
    }
}

/* =========================
   LOAD SISWA
========================= */

async function loadSiswa(){

    try{

        const res =
        await fetch(
            API + "?kelas=" +
            kelas.value
        );

        dataSiswa =
        await res.json();

        for(
            let i=0;
            i<dataSiswa.length;
            i++
        ){

            dataSiswa[i].status = "H";
        }

        updateTable();

    }catch(err){

        alert(
            "Gagal mengambil data siswa"
        );
    }
}

/* =========================
   SET STATUS
========================= */

function setStatus(index,status){

    if(!dataSiswa[index]) return;

    if(
        dataSiswa[index].status ===
        status
    ){
        return;
    }

    dataSiswa[index].status =
    status;

    updateStatusUI(index);
}

/* =========================
   SIMPAN
========================= */

async function simpan(){

    try{

        const data = {

            kelas:
            kelas.value,

            tanggal:
            tanggal.value,

            absensi:
            dataSiswa
        };

        const res =
        await fetch(API,{

            method:"POST",

            body:
            JSON.stringify(data)
        });

        await res.text();

    }catch(err){}

}

/* =========================
   DOWNLOAD CSV
========================= */

async function downloadCSV(){

    const kelasDipilih =
    kelasDownload.value;

    if(!kelasDipilih){

        alert(
            "Pilih kelas terlebih dahulu"
        );

        return;
    }

    try{

        const response =
        await fetch(
            API +
            "?rekap=" +
            kelasDipilih
        );

        const data =
        await response.json();

        let csv = "";

        for(
            let i=0;
            i<data.length;
            i++
        ){
            csv +=
            data[i].join(";") +
            "\n";
        }

        Android.downloadCSV(csv);

    }catch(err){

        alert(
            "Gagal mengunduh rekap"
        );
    }
}

/* =========================
   STARTUP
========================= */

window.onload = function(){

    tanggal.value =
    new Date()
    .toISOString()
    .split("T")[0];

    initTable();
    loadSiswa();
};

</script>

</body>
</html>
